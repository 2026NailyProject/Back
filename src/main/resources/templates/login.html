<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f8f8f8; }
        .container { height: 100vh; display: flex; justify-content: center; align-items: center; background: white; }
        .box { width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ddd; border: none; cursor: pointer; }
        .error { color: red; font-size: 13px; margin-bottom: 10px; display: none; }
        .signup-link { margin-top: 15px; font-size: 13px; color: #888; }
        .signup-link a { color: #333; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h2>Login</h2>
        <input type="text" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <div class="error" id="errorMsg"></div>
        <button onclick="login()">로그인</button>
        <div class="signup-link">
            계정이 없으신가요? <a href="/signup">회원가입</a>
        </div>
    </div>
</div>

<script>
    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            showError('이메일과 비밀번호를 입력해주세요.');
            return;
        }

        try {
            const res = await fetch('/users/email/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await res.json();

            if (result.ok) {
                // 토큰 저장 후 프로필 페이지로 이동
                localStorage.setItem('accessToken', result.data.token);
                window.location.href = '/profile';
            } else {
                showError(result.message);
            }
        } catch (e) {
            showError('서버 오류가 발생했습니다.');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
