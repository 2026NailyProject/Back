<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f8f8f8;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .box {
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .email-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .email-row input {
            margin-bottom: 0;
            flex: 1;
        }

        .email-row button {
            width: auto;
            padding: 10px 12px;
            background: #555;
            color: white;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ddd;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .success {
            color: green;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .login-link {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }

        .login-link a {
            color: #333;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>회원가입</h2>

        <!-- 이메일 + 인증코드 발송 버튼 -->
        <div class="email-row">
            <input type="text" id="email" placeholder="Email">
            <button onclick="sendCode()">인증코드 발송</button>
        </div>

        <!-- 인증코드 입력 + 확인 버튼 -->
        <div class="email-row">
            <input type="text" id="verifyCode" placeholder="인증코드 6자리">
            <button onclick="verifyCode()">확인</button>
        </div>

        <div class="success" id="successMsg"></div>
        <div class="error" id="errorMsg"></div>

        <input type="password" id="password" placeholder="Password">
        <input type="text" id="name" placeholder="이름">
        <input type="text" id="nickname" placeholder="닉네임">

        <button onclick="signup()">회원가입</button>

        <div class="login-link">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>
</div>

<script>
    let isVerified = false; // 이메일 인증 완료 여부

    // 인증코드 발송
    async function sendCode() {
        const email = document.getElementById('email').value.trim();
        if (!email) { showError('이메일을 입력해주세요.'); return; }

        try {
            const res = await fetch(`/users/email/send?email=${encodeURIComponent(email)}`, {
                method: 'POST'
            });
            const result = await res.json();
            if (result.ok) {
                showSuccess('인증코드가 발송되었습니다. 이메일을 확인해주세요.');
            } else {
                showError(result.message);
            }
        } catch (e) {
            showError('서버 오류가 발생했습니다.');
        }
    }

    // 인증코드 확인
    async function verifyCode() {
        const email = document.getElementById('email').value.trim();
        const code  = document.getElementById('verifyCode').value.trim();
        if (!code) { showError('인증코드를 입력해주세요.'); return; }

        try {
            const res = await fetch(`/users/email/verify?email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`, {
                method: 'POST'
            });
            const result = await res.json();
            if (result.ok) {
                isVerified = true;
                showSuccess('이메일 인증이 완료되었습니다!');
            } else {
                showError(result.message);
            }
        } catch (e) {
            showError('서버 오류가 발생했습니다.');
        }
    }

    // 회원가입
    async function signup() {
        if (!isVerified) { showError('이메일 인증을 먼저 완료해주세요.'); return; }

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const name     = document.getElementById('name').value.trim();
        const nickname = document.getElementById('nickname').value.trim();

        if (!email || !password || !name || !nickname) {
            showError('모든 항목을 입력해주세요.');
            return;
        }

        try {
            const res = await fetch('/users/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, name, nickname })
            });
            const result = await res.json();
            if (result.ok) {
                alert('회원가입이 완료되었습니다!');
                window.location.href = '/login';
            } else {
                showError(result.message);
            }
        } catch (e) {
            showError('서버 오류가 발생했습니다.');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        document.getElementById('successMsg').style.display = 'none';
        el.textContent = msg;
        el.style.display = 'block';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        document.getElementById('errorMsg').style.display = 'none';
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>

</body>
</html>
