<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Naily Main</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f8f8f8;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            background: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .auth-links a {
            margin-left: 15px;
            color: #333;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .main h1 {
            font-size: 36px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: #ddd;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Naily</div>
        <div class="auth-links" id="authArea">
            <!-- JS로 채워짐 -->
        </div>
    </div>

    <div class="main">
        <h1>Own your Nail</h1>
        <p>지금 바로 시작해보세요</p>
        <button class="btn" onclick="goLogin()">시작하기 ></button>
    </div>
</div>

<script>
    window.onload = function() {
        const token = localStorage.getItem('accessToken');
        const authArea = document.getElementById('authArea');

        if (token) {
            // 로그인 상태 → 프로필 + 로그아웃
            authArea.innerHTML = `
                <a href="/profile-test">프로필</a>
                <a href="#" onclick="logout()">로그아웃</a>
            `;
        } else {
            // 비로그인 상태 → Sign in
            authArea.innerHTML = '<a href="/login">Sign in</a>';
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        window.location.reload();
    }

    function goLogin() {
        window.location.href = '/login';
    }
</script>

</body>
</html>
