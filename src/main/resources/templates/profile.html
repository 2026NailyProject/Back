<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 테스트</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f8f8f8; }
        .container { height: 100vh; display: flex; justify-content: center; align-items: center; background: white; }
        .box { width: 400px; text-align: center; }
        button { width: 100%; padding: 10px; background: #ddd; border: none; cursor: pointer; margin-bottom: 10px; }
        .result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 6px; text-align: left; font-size: 14px; display: none; word-break: break-all; }
        .result.success { border-left: 4px solid green; }
        .result.error { border-left: 4px solid red; }
        .profile-item { margin-bottom: 8px; }
        .profile-item span { font-weight: bold; }
        .token-box { font-size: 11px; color: #aaa; margin-bottom: 15px; word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h2>프로필 조회 테스트</h2>
        <div class="token-box" id="tokenDisplay"></div>
        <button onclick="getProfile()">내 프로필 조회</button>
        <button onclick="logout()" style="background:#ffdddd;">로그아웃</button>
        <div class="result" id="result"></div>
    </div>
</div>

<script>
    // 토큰 없으면 로그인 페이지로
    const token = localStorage.getItem('accessToken');
    if (!token) {
        window.location.href = '/login';
    } else {
        document.getElementById('tokenDisplay').textContent = 'Token: ' + token;
    }

    async function getProfile() {
        try {
            const res = await fetch('/users/me', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            const result = await res.json();

            if (result.ok) {
                const d = result.data;
                showResult(true, result.message, `
                    <div class="profile-item"><span>userId:</span> ${d.userId}</div>
                    <div class="profile-item"><span>email:</span> ${d.email}</div>
                    <div class="profile-item"><span>name:</span> ${d.name}</div>
                    <div class="profile-item"><span>nickname:</span> ${d.nickname}</div>
                    <div class="profile-item"><span>provider:</span> ${d.provider}</div>
                    <div class="profile-item"><span>createdAt:</span> ${d.createdAt}</div>
                `);
            } else {
                showResult(false, result.message, null);
            }
        } catch (e) {
            showResult(false, '서버 오류가 발생했습니다.', null);
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        window.location.href = '/login';
    }

    function showResult(isSuccess, message, html) {
        const resultEl = document.getElementById('result');
        resultEl.className = 'result ' + (isSuccess ? 'success' : 'error');
        resultEl.style.display = 'block';
        resultEl.innerHTML = `<div class="profile-item">${message}</div>` + (html || '');
    }
</script>
</body>
</html>
